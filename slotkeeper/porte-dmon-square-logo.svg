<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(100, 100)">
    <!-- Simple gate frame -->
    <rect x="-65" y="-75" width="130" height="150" fill="none" stroke="#1a1a1a" stroke-width="3" rx="3"/>
    
    <!-- Center vertical divider (門の中央) -->
    <line x1="0" y1="-75" x2="0" y2="75" stroke="#1a1a1a" stroke-width="2"/>
    
    <!-- M emphasized in the center -->
    <g transform="translate(0, 5)">
      <!-- M strokes -->
      <path d="M -25,-30 L -25,30 M -25,-30 L 0,0 M 0,0 L 25,-30 L 25,30" 
            stroke="#00D9FF" 
            stroke-width="5" 
            stroke-linecap="round" 
            stroke-linejoin="round" 
            fill="none"/>
    </g>
    
    <!-- Subtle threshold -->
    <line x1="-65" y1="77" x2="65" y2="77" stroke="#00D9FF" stroke-width="2" opacity="0.4"/>
  </g>
</svg>