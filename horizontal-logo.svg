<svg viewBox="0 0 260 80" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(10, 40)">
    <!-- Simple gate icon -->
    <g transform="translate(0, 0)">
      <rect x="-20" y="-25" width="40" height="50" fill="none" stroke="#1a1a1a" stroke-width="2" rx="2"/>
      <line x1="0" y1="-25" x2="0" y2="25" stroke="#1a1a1a" stroke-width="1.5"/>
      <!-- M inside gate -->
      <path d="M -10,-10 L -10,10 M -10,-10 L 0,0 M 0,0 L 10,-10 L 10,10" 
            stroke="#00D9FF" 
            stroke-width="2.5" 
            stroke-linecap="round" 
            stroke-linejoin="round" 
            fill="none"/>
    </g>
    
    <!-- Porte d'Mon text -->
    <text x="35" y="6" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="500" fill="#1a1a1a" letter-spacing="-0.5">
      Porte d'Mon
    </text>
  </g>
</svg>